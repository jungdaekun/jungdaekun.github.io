<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JUNG DAEKUN | Split Screen</title>
<style>
  body, html { margin: 0; padding: 0; background: #0a0a0a; color: #fff; font-family: "Inter", sans-serif; overflow-x: hidden; }
  .left-pane { position: fixed; top: 0; left: 0; width: 40%; height: 100vh; background: #111; padding: 80px 60px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid #333; }
  .right-pane { margin-left: 40%; width: 60%; padding: 80px 40px; box-sizing: border-box; }
  h1 { font-size: 4rem; text-transform: uppercase; margin-bottom: 20px; line-height: 1; }
  h1 span { color: #d4b355; }
  .desc { font-size: 1rem; color: #888; line-height: 1.8; margin-bottom: 40px; }
  .menu a { display: block; color: #fff; text-decoration: none; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 15px; font-weight: bold; letter-spacing: 2px; transition: 0.2s; }
  .menu a:hover { color: #d4b355; padding-left: 10px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card { width: 100%; aspect-ratio: 4/5; background: #222; overflow: hidden; position: relative; }
  .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; filter: grayscale(50%); }
  .card:hover img { transform: scale(1.05); filter: grayscale(0%); }
  .card-title { position: absolute; bottom: 20px; left: 20px; font-size: 1.2rem; font-weight: bold; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
</style>
</head>
<body>
  <div class="left-pane">
    <h1>Jung<br><span>Daekun</span></h1>
    <p class="desc">15+ Years Senior Environment Artist.<br>Elevating visual standards and optimizing pipelines for AAA titles like Project M and ODIN.</p>
    <div class="menu">
      <a href="#">Professional</a>
      <a href="#">Featured</a>
      <a href="#">Personal</a>
      <a href="#">Contact</a>
    </div>
  </div>
  <div class="right-pane">
    <div class="grid">
      <div class="card"><img src="https://img.youtube.com/vi/bDXLAaqR_Yg/maxresdefault.jpg"><div class="card-title">Project M</div></div>
      <div class="card"><img src="https://img.youtube.com/vi/tvAcoxRube0/maxresdefault.jpg"><div class="card-title">ODIN</div></div>
      <div class="card"><img src="https://img.youtube.com/vi/2zKdRMch0Us/maxresdefault.jpg"><div class="card-title">창세기전</div></div>
      <div class="card"><img src="https://img.youtube.com/vi/mcTm2DmXd3Y/maxresdefault.jpg"><div class="card-title">Urban Hideout</div></div>
      <div class="card"><img src="https://img.youtube.com/vi/NOZ51TUyemo/maxresdefault.jpg"><div class="card-title">Ascendant One</div></div>
      <div class="card"><img src="https://img.youtube.com/vi/WehIUseB8FQ/maxresdefault.jpg"><div class="card-title">HMMWV</div></div>
    </div>
  </div>
</body>
</html>
