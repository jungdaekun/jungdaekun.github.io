<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JUNG DAEKUN | Typo Hover</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<style>
  body { background: #080a0d; color: #fff; margin: 0; overflow-x: hidden; font-family: "Rajdhani", sans-serif; }
  #bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.15; transition: opacity 0.5s ease, transform 4s ease-out; transform: scale(1.1); z-index: 0; filter: grayscale(30%); }
  .menu { position: relative; z-index: 1; padding: 15vh 10vw; display: flex; flex-direction: column; gap: 20px; }
  .title-top { font-family: monospace; color: #d4b355; letter-spacing: 5px; margin-bottom: 40px; }
  .item { font-size: clamp(3rem, 6vw, 7rem); font-weight: 700; text-transform: uppercase; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.2); margin: 0; cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); position: relative; width: fit-content; }
  .item::after { content: attr(data-sub); position: absolute; right: -20px; top: 50%; transform: translate(100%, -50%); font-family: monospace; font-size: 1rem; color: #d4b355; opacity: 0; -webkit-text-stroke: 0; transition: 0.4s; white-space: nowrap; letter-spacing: 2px; }
  .item:hover { color: #fff; -webkit-text-stroke: 0px transparent; padding-left: 40px; }
  .item:hover::after { opacity: 1; transform: translate(120%, -50%); }
  /* Hover effect helper */
  .item:hover ~ #bg-helper { }
</style>
</head>
<body>
  <img id="bg" src="https://img.youtube.com/vi/bDXLAaqR_Yg/maxresdefault.jpg">
  <div class="menu">
    <div class="title-top">SELECTED WORKS (Hover to reveal)</div>
    <h1 class="item" data-src="https://img.youtube.com/vi/bDXLAaqR_Yg/maxresdefault.jpg" data-sub="NCSoft / PS5">Project M</h1>
    <h1 class="item" data-src="https://img.youtube.com/vi/tvAcoxRube0/maxresdefault.jpg" data-sub="Lionheart Studio">ODIN</h1>
    <h1 class="item" data-src="https://img.youtube.com/vi/2zKdRMch0Us/maxresdefault.jpg" data-sub="Line Games">창세기전</h1>
    <h1 class="item" data-src="https://img.youtube.com/vi/mcTm2DmXd3Y/maxresdefault.jpg" data-sub="Personal / Look-dev">Urban Hideout</h1>
    <h1 class="item" data-src="https://img.youtube.com/vi/NOZ51TUyemo/maxresdefault.jpg" data-sub="Nexon">Ascendant One</h1>
  </div>
  <script>
    const bg = document.getElementById("bg");
    document.querySelectorAll(".item").forEach(el => {
      el.addEventListener("mouseenter", () => {
        bg.style.opacity = "0";
        setTimeout(() => {
          bg.src = el.dataset.src;
          bg.style.transform = "scale(1.0)";
          bg.style.opacity = "0.6";
        }, 200);
      });
      el.addEventListener("mouseleave", () => {
        bg.style.transform = "scale(1.1)";
        bg.style.opacity = "0.15";
      });
    });
  </script>
</body>
</html>
