<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JUNG DAEKUN | Accordion Showcase</title>
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: "Rajdhani", sans-serif; overflow: hidden; }
  .accordion { display: flex; width: 100vw; height: 100vh; }
  .panel { flex: 1; position: relative; overflow: hidden; transition: flex 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94); cursor: pointer; border-right: 1px solid rgba(255,255,255,0.1); }
  .panel:last-child { border-right: none; }
  .panel img { position: absolute; top: 0; left: 50%; transform: translateX(-50%); height: 100%; min-width: 100vw; object-fit: cover; opacity: 0.4; filter: grayscale(80%); transition: 0.6s; pointer-events: none; }
  .panel:hover { flex: 5; }
  .panel:hover img { opacity: 1; filter: grayscale(0%); }
  
  .content { position: absolute; bottom: 40px; left: 40px; right: 40px; opacity: 0; transform: translateY(20px); transition: 0.4s; pointer-events: none; }
  .panel:hover .content { opacity: 1; transform: translateY(0); transition-delay: 0.3s; }
  
  .title-vertical { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-90deg); font-size: 2rem; color: #fff; letter-spacing: 5px; text-transform: uppercase; white-space: nowrap; transition: 0.4s; pointer-events: none; mix-blend-mode: overlay; font-weight: bold; }
  .panel:hover .title-vertical { opacity: 0; }

  h2 { font-size: 4rem; margin: 0; text-transform: uppercase; color: #fff; text-shadow: 0 5px 20px rgba(0,0,0,0.9); line-height: 1; }
  p { font-family: monospace; color: #d4b355; font-size: 1.2rem; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
  
  .hero-logo { position: absolute; top: 40px; left: 40px; z-index: 100; color: #fff; font-size: 1.5rem; font-weight: bold; letter-spacing: 5px; pointer-events: none; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }
  .hero-logo span { color: #d4b355; }
</style>
</head>
<body>
  <div class="hero-logo">JUNG<span>DAEKUN</span></div>
  <div class="accordion">
    <div class="panel">
      <img src="https://img.youtube.com/vi/bDXLAaqR_Yg/maxresdefault.jpg">
      <div class="title-vertical">Project M</div>
      <div class="content"><h2>Project M</h2><p>NCSoft / PlayStation 5</p></div>
    </div>
    <div class="panel">
      <img src="https://img.youtube.com/vi/tvAcoxRube0/maxresdefault.jpg">
      <div class="title-vertical">ODIN</div>
      <div class="content"><h2>ODIN: Valhalla Rising</h2><p>Lionheart Studio / Mobile & PC</p></div>
    </div>
    <div class="panel">
      <img src="https://img.youtube.com/vi/2zKdRMch0Us/maxresdefault.jpg">
      <div class="title-vertical">창세기전</div>
      <div class="content"><h2>창세기전: 회색의 잔영</h2><p>Line Games / Nintendo Switch</p></div>
    </div>
    <div class="panel">
      <img src="https://img.youtube.com/vi/NOZ51TUyemo/maxresdefault.jpg">
      <div class="title-vertical">Ascendant One</div>
      <div class="content"><h2>Ascendant One</h2><p>Nexon / PC Online</p></div>
    </div>
    <div class="panel">
      <img src="https://img.youtube.com/vi/mcTm2DmXd3Y/maxresdefault.jpg">
      <div class="title-vertical">Urban Hideout</div>
      <div class="content"><h2>Urban Hideout</h2><p>Personal / Look-dev</p></div>
    </div>
  </div>
</body>
</html>
